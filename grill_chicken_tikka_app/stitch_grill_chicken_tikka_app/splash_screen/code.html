            0% { opacity: 0; transform: scale(0.9) translateY(20px); }
            100% { opacity: 1; transform: scale(1) translateY(0); }

        @keyframes pulse-gold {
            0% { box-shadow: 0 0 0 0 rgba(205, 170, 109, 0.2); }
            70% { box-shadow: 0 0 0 30px rgba(205, 170, 109, 0); }
            100% { box-shadow: 0 0 0 0 rgba(205, 170, 109, 0); }
        }

        .entrance-animation {
            animation: logo-entrance 1.2s cubic-bezier(0.16, 1, 0.3, 1) forwards;
        }

        .float-animation {
            animation: subtle-float 6s ease-in-out infinite;

        .premium-glow {

<!-- Interactive Layer for Splash Exit Logic (Simulation) -->
<div class="fixed inset-0 z-50 cursor-pointer flex items-end justify-center pb-xxl opacity-0 hover:opacity-100 transition-opacity duration-500" id="splash-overlay">
<div class="flex flex-col items-center gap-sm">

<span class="material-symbols-outlined text-primary animate-bounce">expand_more</span>
</div>

<!-- Micro-interaction Script -->
<script>
        document.addEventListener('DOMContentLoaded', () => {
            const logo = document.querySelector('.float-animation');
            const body = document.body;

            // Subtle parallax effect on mouse move
            body.addEventListener('mousemove', (e) => {
                const xAxis = (window.innerWidth / 2 - e.pageX) / 45;
                const yAxis = (window.innerHeight / 2 - e.pageY) / 45;
                logo.style.transform = `rotateY(${xAxis}deg) rotateX(${yAxis}deg)`;
            });

            // Transition to main content simulation
            document.getElementById('splash-overlay').addEventListener('click', () => {
                body.classList.add('transition-all', 'duration-1000', 'opacity-0', 'scale-105');
                setTimeout(() => {
                    // In a real app, this would route to /home
                    window.location.reload(); 
                }, 1000);
            });
        });
    </script>
