<style>
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 1, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        }
        body {
            background-color: #fff8f3; /* background */
            color: #1e1b17; /* on-background */
        }
        /* Custom Squircle for Buttons/Cards */
        .squircle {
            border-radius: 16px;
            /* In a real project, we might use mask-image for a true squircle, sticking to border-radius for simplicity here while maintaining the soft feel */
        }
        .btn-primary {
            background: linear-gradient(135deg, #cdaa6d 0%, #765a25 100%);
            box-shadow: 0px 4px 20px rgba(205, 170, 109, 0.2);
        }
        .btn-primary:hover {
            opacity: 0.9;
        }
        .glass-nav {
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
        }
    </style>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
  </head>
<body class="antialiased min-h-screen flex flex-col font-body-lg">
<!-- Top Navigation (Transactional/Task-focused, so simplified shell) -->
<header class="w-full bg-surface/80 glass-nav shadow-[0px_4px_20px_rgba(205,170,109,0.08)] sticky top-0 z-50 transition-all duration-300">
<div class="max-w-container-max mx-auto px-md md:px-lg h-16 flex items-center justify-between">
<!-- Back Button -->
<button aria-label="Go back" class="w-10 h-10 flex items-center justify-center rounded-full hover:bg-surface-variant transition-colors text-on-surface">
<span class="material-symbols-outlined text-2xl" data-icon="arrow_back" data-weight="fill">arrow_back</span>
</button>
<!-- Brand Anchor -->
<h1 class="font-headline-md text-headline-md text-primary tracking-tight">Cart</h1>
<!-- Spacer for alignment -->
<div class="w-10 h-10"></div>
</div>
</header>
<!-- Main Content Canvas -->
<main class="flex-grow flex flex-col items-center justify-center px-md py-xl md:px-lg max-w-container-max mx-auto w-full relative overflow-hidden">
<!-- Ambient Background Glow (Subtle depth) -->
<div class="absolute inset-0 flex items-center justify-center pointer-events-none opacity-40">
<div class="w-64 h-64 bg-primary-container rounded-full blur-3xl mix-blend-multiply filter"></div>
</div>
<!-- Empty State Container -->
<div class="relative z-10 flex flex-col items-center text-center max-w-md w-full animate-fade-in-up">
<!-- Illustration Area -->
<div class="w-48 h-48 md:w-64 md:h-64 mb-lg relative flex items-center justify-center bg-surface-container-lowest rounded-full shadow-[0px_4px_20px_rgba(205,170,109,0.08)] p-md">
<img alt="Empty Plate" class="w-full h-full object-cover rounded-full opacity-90" data-alt="A meticulously styled, top-down photograph of an empty, artisan ceramic dining plate resting on a textured, off-white linen cloth. The plate has a subtle golden rim, perfectly catching the warm, directional natural light. The setting evokes a high-end, elegant restaurant atmosphere before a meal begins. Soft shadows create a sense of depth, and a sprig of fresh herbs sits delicately off to the side, maintaining an appetizing yet minimal aesthetic." src="https://lh3.googleusercontent.com/aida-public/AB6AXuC0MDEVccvJe4ws47XjmonZpwhgyRAAWp8tLqVm-gL1sDkbhGoA6DILGa2ta0A4lsdvnA5mFAZyaK-mEjZHBfDRTUN4Dn8sMM9FdusTV7u1_GA1ZCWLiwCIBpUsAqTEh0SqszMv9T5JLL7jdjc_FZXF0DK-3DkGIZ1mWuVJNUPfhCzGGgsxh30iR00iM65Rjr5pSnF9ar6CxByuhKdVpmDsRPCt2Gk_sRKeEXxcf2HCnOc_HR85FyQ0CBqfVKqdyzIHgK4xr7Swt6M"/>
<!-- Floating Icon Accent -->
<div class="absolute -bottom-2 -right-2 bg-surface-container-lowest p-3 rounded-full shadow-md text-outline">
<span class="material-symbols-outlined text-3xl" data-icon="shopping_bag">shopping_bag</span>
</div>
</div>
<!-- Typography -->
<h2 class="font-headline-lg-mobile md:font-headline-lg text-headline-lg-mobile md:text-headline-lg text-on-surface mb-sm tracking-tight">Your cart is feeling light</h2>
<p class="font-body-md text-body-md text-on-surface-variant mb-xl max-w-xs md:max-w-sm">
                Looks like you haven't added any of our delicious charcoal-grilled specialties yet.
            </p>
<!-- Call to Action -->
<button class="btn-primary squircle w-full md:w-auto px-xxl py-md flex items-center justify-center space-x-sm text-on-primary font-label-lg text-label-lg transition-transform hover:scale-[1.02] active:scale-95">
<span class="material-symbols-outlined" data-icon="restaurant_menu">restaurant_menu</span>
<span>Start Ordering</span>
</button>
<!-- Secondary Action (Optional exploration) -->
<button class="mt-lg px-lg py-sm text-primary font-label-lg text-label-lg border border-transparent hover:border-primary-container rounded-full transition-colors flex items-center space-x-xs">
<span>View Previous Orders</span>
<span class="material-symbols-outlined text-lg" data-icon="arrow_forward">arrow_forward</span>
</button>
</div>
</main>
<!-- Suppressed Nav Shells: 
         - BottomNavBar: Excluded because this is a task-focused/transactional screen (Cart) and implies a departure from the main flow.
    -->
<style>
        /* Simple entry animation */
        @keyframes fadeInUp {
            from {
                opacity: 0;
                transform: translateY(20px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }
        .animate-fade-in-up {
            animation: fadeInUp 0.6s ease-out forwards;
        }
    </style>
