<style>

<body class="antialiased text-on-background min-h-screen flex flex-col items-center justify-center relative px-md md:px-0">
<div class="bg-ambient"></div>
<!-- Back Button - Top Left -->
<button aria-label="Go Back" class="absolute top-md left-md md:top-lg md:left-lg w-12 h-12 flex items-center justify-center rounded-full bg-surface-container-lowest shadow-[0px_4px_20px_rgba(205,170,109,0.08)] text-primary hover:bg-surface-container transition-colors">
<span class="material-symbols-outlined" style="font-variation-settings: 'FILL' 0;">arrow_back</span>
</button>
<main class="w-full max-w-[420px] bg-surface-container-lowest rounded-[32px] shadow-[0px_12px_32px_rgba(30,30,30,0.04)] border border-outline-variant/30 p-xl relative overflow-hidden">
<!-- Subtle decorative element -->
<div class="absolute -top-10 -right-10 w-32 h-32 bg-primary-container opacity-10 rounded-full blur-2xl"></div>
<!-- Header Section -->
<div class="text-center mb-xl relative z-10">
<div class="w-20 h-20 mx-auto bg-surface-container rounded-[24px] flex items-center justify-center mb-lg shadow-[0px_4px_20px_rgba(205,170,109,0.08)]">
<span class="material-symbols-outlined text-primary text-4xl" style="font-variation-settings: 'FILL' 1;">lock_open</span>
</div>
<h1 class="font-headline-lg text-headline-lg text-on-background mb-sm">Verify Details</h1>
<p class="font-body-md text-body-md text-on-surface-variant">
                We've sent a 4-digit code to <br/>
<strong class="text-on-background font-semibold">+962 7 9123 4567</strong>
</p>
</div>
<!-- OTP Input Section -->
<form class="flex flex-col gap-xl relative z-10">
<div class="flex justify-between items-center gap-sm" id="otp-container">
<input aria-label="Digit 1" autofocus="" class="otp-input" inputmode="numeric" maxlength="1" type="text"/>
<input aria-label="Digit 2" class="otp-input" disabled="" inputmode="numeric" maxlength="1" type="text"/>
<input aria-label="Digit 3" class="otp-input" disabled="" inputmode="numeric" maxlength="1" type="text"/>
<input aria-label="Digit 4" class="otp-input" disabled="" inputmode="numeric" maxlength="1" type="text"/>
</div>
<!-- Timer and Resend -->
<div class="flex justify-center items-center gap-2 font-label-lg text-label-lg">
<span class="text-on-surface-variant">Didn't receive code?</span>
<button class="text-secondary hover:text-secondary-container transition-colors disabled:opacity-50 disabled:cursor-not-allowed" disabled="" id="resend-btn" type="button">
                    Resend in <span class="font-mono" id="timer">00:30</span>
</button>
</div>
<!-- Verify Button -->
<button class="squircle-btn w-full py-4 text-on-primary font-label-lg text-label-lg shadow-[0px_8px_24px_rgba(205,170,109,0.2)] hover:shadow-[0px_12px_32px_rgba(205,170,109,0.3)] transition-all transform hover:-translate-y-0.5 active:translate-y-0 active:scale-95 flex items-center justify-center gap-sm mt-sm" type="button">
                Verify Order
                <span class="material-symbols-outlined text-[20px]" style="font-variation-settings: 'FILL' 0;">arrow_forward</span>
</button>
</form>
<!-- Secondary action -->
<div class="mt-lg text-center relative z-10">
<button class="font-label-lg text-label-lg text-primary hover:text-primary-container transition-colors border-b border-transparent hover:border-primary pb-0.5" type="button">
                Change phone number
            </button>
</div>
</main>
<script>
        document.addEventListener('DOMContentLoaded', () => {
            const inputs = document.querySelectorAll('.otp-input');
            const resendBtn = document.getElementById('resend-btn');
            const timerSpan = document.getElementById('timer');
            
            // OTP Input Logic
            inputs.forEach((input, index) => {
                // Focus styling
                input.addEventListener('input', (e) => {
                    const val = e.target.value;
                    
                    if (val.length === 1) {
                        input.classList.add('filled');
                        // Move to next input
                        if (index < inputs.length - 1) {
                            inputs[index + 1].disabled = false;
                            inputs[index + 1].focus();
                        }
                    } else if (val.length === 0) {
                        input.classList.remove('filled');
                    }
                });

                // Backspace handling
                input.addEventListener('keydown', (e) => {
                    if (e.key === 'Backspace' && input.value === '') {
                        if (index > 0) {
                            input.classList.remove('filled');
                            inputs[index - 1].focus();
                            inputs[index - 1].value = '';
                            inputs[index - 1].classList.remove('filled');
                        }
                    }
                });
                
                // Allow only numbers
                input.addEventListener('keypress', (e) => {
                    if (isNaN(parseInt(e.key, 10))) {
                        e.preventDefault();
                    }
                });
            });

            // Timer Logic
            let timeLeft = 30;
            let timerId;

            function startTimer() {
                timeLeft = 30;
                resendBtn.disabled = true;
                resendBtn.classList.add('opacity-50', 'cursor-not-allowed');
                
                timerId = setInterval(() => {
                    timeLeft--;
                    const seconds = timeLeft.toString().padStart(2, '0');
                    timerSpan.textContent = `00:${seconds}`;
                    
                    if (timeLeft <= 0) {
                        clearInterval(timerId);
                        resendBtn.disabled = false;
                        resendBtn.classList.remove('opacity-50', 'cursor-not-allowed');
                        resendBtn.innerHTML = 'Resend Now';
                    }
                }, 1000);
            }

            resendBtn.addEventListener('click', () => {
                if (timeLeft <= 0) {
                    resendBtn.innerHTML = 'Resend in <span id="timer" class="font-mono">00:30</span>';
                    // Re-grab timer element after rewriting innerHTML
                    const newTimerSpan = document.getElementById('timer');
                    // Reset timer visual immediately
                    newTimerSpan.textContent = '00:30'; 
                    // Clear inputs visually
                    inputs.forEach((input, idx) => {
                        input.value = '';
                        input.classList.remove('filled');
                        if(idx > 0) input.disabled = true;
                    });
                    inputs[0].focus();
                    
                    startTimer();
                }
            });

            // Init timer
            startTimer();
        });
    </script>
</body></html>
